# Render Blueprint for workbook-api.
# Provisions a managed PostgreSQL instance and a Dockerized web service.
# Docs: https://render.com/docs/blueprint-spec
#
# The web service runs the multi-stage Dockerfile. On every deploy the
# entrypoint applies pending migrations (`prisma migrate deploy`) before the
# new instance starts serving traffic. Demo seeding is disabled in production.
services:
  - type: web
    name: workbook-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    # REST health endpoint returns 200 with a live DB probe. Do NOT point this
    # at /graphql: a plain GET to the GraphQL endpoint responds with HTTP 400.
    healthCheckPath: /health
    # Persistent disk for uploaded binaries. Without this, the local filesystem
    # is ephemeral and uploads are lost on every deploy/restart. A disk pins the
    # service to a single instance (no horizontal scaling / zero-downtime
    # deploys); migrate to object storage to scale out.
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Keep the GraphQL sandbox / introspection disabled in production.
      - key: GRAPHQL_PLAYGROUND
        value: false
      # Comma-separated allowlist of frontend origins. Set in the dashboard.
      - key: CORS_ORIGINS
        sync: false
      # Public origin the API is reachable at, e.g. https://workbook-api.onrender.com
      # (no trailing slash). Used to build absolute URLs for served uploads.
      # Set this in the dashboard after the first deploy assigns the URL.
      - key: PUBLIC_BASE_URL
        sync: false
      - key: RATE_LIMIT_TTL_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 120
      - key: UPLOAD_RATE_LIMIT_TTL_MS
        value: 60000
      - key: UPLOAD_RATE_LIMIT_MAX
        value: 20
      # Must match the disk mountPath above so uploads land on the disk.
      - key: UPLOADS_DIR
        value: /app/uploads
      - key: MAX_UPLOAD_SIZE_BYTES
        value: 10485760
      - key: ALLOWED_MIME_TYPES
        value: image/png,image/jpeg,image/gif,image/webp,application/pdf
      # Never seed demo data into the production database.
      - key: SEED_ON_STARTUP
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: workbook-db
          property: connectionString

databases:
  - name: workbook-db
    databaseName: workbook
    user: workbook
    plan: basic-256mb
